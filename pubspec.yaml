name: inventory_app
description: A Very Good Project created by Very Good CLI.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ^3.41.1

workspace:
  - packages/app_ui
  - packages/firebase_authentication_service
  - packages/firebase_part_remote
  - packages/firebase_stock_remote
  - packages/firebase_storage_remote
  - packages/firebase_user_remote
  - packages/part_remote
  - packages/part_repository
  - packages/stock_remote
  - packages/stock_repository
  - packages/storage_remote
  - packages/storage_repository
  - packages/user_remote
  - packages/user_repository
  - packages/authentication_service

dependencies:
  app_ui:
    path: packages/app_ui
  authentication_service:
    path: packages/authentication_service
  bloc: ^9.2.0
  bloc_concurrency: ^0.3.0
  bloc_test: ^10.0.0
  firebase_authentication_service:
    path: packages/firebase_authentication_service
  firebase_core: ^4.4.0
  firebase_part_remote:
    path: packages/firebase_part_remote
  firebase_stock_remote:
    path: packages/firebase_stock_remote
  firebase_storage_remote:
    path: packages/firebase_storage_remote
  firebase_user_remote:
    path: packages/firebase_user_remote
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  freezed: ^3.2.3
  freezed_annotation: ^3.1.0
  intl: ^0.20.2
  part_remote:
    path: packages/part_remote
  part_repository:
    path: packages/part_repository
  rxdart: ^0.28.0
  stock_remote:
    path: packages/stock_remote
  stock_repository:
    path: packages/stock_repository
  storage_repository:
    path: packages/storage_repository
  user_remote:
    path: packages/user_remote
  user_repository:
    path: packages/user_repository

dev_dependencies:
  bloc_lint: ">=0.3.3 <0.3.6"
  bloc_tools: ^0.1.0-dev.20
  build_runner: ^2.11.1
  flutter_test:
    sdk: flutter
  melos: ^7.4.0
  mocktail: ^1.0.4
  very_good_analysis: ^10.1.0

flutter:
  generate: true
  uses-material-design: true

melos:
  scripts:
    generate:
      run: |
        fvm dart run build_runner build --delete-conflicting-outputs
        melos exec -c 1 --depends-on build_runner -- fvm dart run build_runner build --delete-conflicting-outputs
    upgrade:
      run: |
        fvm flutter pub upgrade
        fvm dart run melos bootstrap
    full-upgrade:
      run: |
        fvm install stable
        fvm use stable
        melos exec -- fvm flutter pub upgrade
        melos bootstrap

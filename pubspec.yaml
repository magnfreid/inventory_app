name: inventory_app
description: A Very Good Project created by Very Good CLI.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.11.0 <4.0.0"

workspace:
  - packages/app_ui
  - packages/authentication_service
  - packages/core_remote
  - packages/firebase_authentication_service
  - packages/firebase_image_remote
  - packages/firebase_part_remote
  - packages/firebase_shared
  - packages/firebase_stock_remote
  - packages/firebase_storage_remote
  - packages/firebase_tag_remote
  - packages/firebase_user_remote
  - packages/image_remote
  - packages/image_repository
  - packages/part_remote
  - packages/part_repository
  - packages/stock_remote
  - packages/stock_repository
  - packages/storage_remote
  - packages/storage_repository
  - packages/tag_remote
  - packages/tag_repository
  - packages/user_remote
  - packages/user_repository

dependencies:
  app_ui:
    path: packages/app_ui
  authentication_service:
    path: packages/authentication_service
  bloc: ^9.2.0
  bloc_concurrency: ^0.3.0
  bloc_test: ^10.0.0
  cached_network_image: ^3.4.1
  collection: ^1.19.1
  core_remote:
    path: packages/core_remote
  firebase_authentication_service:
    path: packages/firebase_authentication_service
  firebase_core: ^4.4.0
  firebase_image_remote:
    path: packages/firebase_image_remote
  firebase_part_remote:
    path: packages/firebase_part_remote
  firebase_shared:
    path: packages/firebase_shared
  firebase_stock_remote:
    path: packages/firebase_stock_remote
  firebase_storage_remote:
    path: packages/firebase_storage_remote
  firebase_tag_remote:
    path: packages/firebase_tag_remote
  firebase_user_remote:
    path: packages/firebase_user_remote
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  freezed: ^3.2.3
  freezed_annotation: ^3.1.0
  hydrated_bloc: ^10.1.1
  image: ^4.8.0
  image_picker: ^1.2.1
  image_remote:
    path: packages/image_remote
  image_repository:
    path: packages/image_repository
  intl: ^0.20.2
  json_annotation: ^4.11.0
  part_remote:
    path: packages/part_remote
  part_repository:
    path: packages/part_repository
  path_provider: ^2.1.5
  rxdart: ^0.28.0
  share_plus: ^10.0.0
  shimmer_animation: ^2.2.2+1
  skeletonizer: ^2.1.3
  stock_remote:
    path: packages/stock_remote
  stock_repository:
    path: packages/stock_repository
  storage_repository:
    path: packages/storage_repository
  tag_remote:
    path: packages/tag_remote
  tag_repository:
    path: packages/tag_repository
  user_remote:
    path: packages/user_remote
  user_repository:
    path: packages/user_repository

dev_dependencies:
  bloc_lint: ">=0.3.3 <0.3.6"
  bloc_tools: ^0.1.0-dev.20
  build_runner: ^2.11.1
  flutter_test:
    sdk: flutter
  json_serializable: ^6.13.0
  melos: ^7.4.0
  mocktail: ^1.0.4
  very_good_analysis: ^10.1.0

flutter:
  generate: true
  uses-material-design: true

melos:
  scripts:
    analyze:
      run: melos exec -- fvm flutter analyze .
      description: Run `dart analyze` in all packages.
    boot:
      description: "Bootstrap the repo via FVM"
      run: fvm dart run melos bootstrap
    coverage:
      description: "Run all tests with coverage"
      run: ./run_coverage.sh
    gen:
      description: "Run build_runner in the app (lib)"
      run: fvm dart run build_runner build --delete-conflicting-outputs
    gen-packages:
      description: "Run build_runner in all packages"
      run: melos exec --depends-on=build_runner -c 1 -- fvm dart run build_runner build --delete-conflicting-outputs
    l10n:
      description: "Generate Flutter localization"
      run: fvm flutter gen-l10n
    build-web:
      run: fvm flutter build web -t lib/main_development.dart --release --wasm
    start-server:
      run: dhttpd --path build/web
    deploy-firebase:
      run: firebase deploy --only hosting
